STREAMING_CHUNK: Defining workflow triggers...name: Build Khokha Bliss APKon:push:branches:- mainworkflow_dispatch: # Allows you to manually trigger the build with a buttonSTREAMING_CHUNK: Setting up the compilation environment...jobs:build:name: Compile Android Appruns-on: ubuntu-lateststeps:
  - name: Checkout Source Code
    uses: actions/checkout@v4

  - name: Setup Java JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'

  - name: Setup Node.js v20
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  # STREAMING_CHUNK: Accepting licenses and running builds...
  - name: Accept Android SDK Licenses
    run: |
      yes | sdkmanager --licenses || yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

  - name: Install Cordova Compiler CLI
    run: npm install -g cordova

  - name: Create Native App Shell
    run: |
      cordova create khokhabliss com.khokhabliss.tracker "Khokha Bliss"
      cd khokhabliss
      cordova platform add android
      
      # Clean original placeholder files and replace with Kholoud's configurable index.html
      rm -rf www/*
      cp ../index.html www/

  - name: Compile Unsigned Debug APK
    run: |
      cd khokhabliss
      # Building standard APK target
      cordova build android --debug

  # STREAMING_CHUNK: Exporting the compiled application...
  - name: Export APK to Download Center
    uses: actions/upload-artifact@v4
    with:
      name: KhokhaBliss-Android-APK
      path: khokhabliss/platforms/android/app/build/outputs/apk/debug/app-debug.apk
