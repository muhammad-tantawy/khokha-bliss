steps:
  - name: Checkout Source Code
    uses: actions/checkout@v4

  - name: Setup Java JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'zulu'

  - name: Setup Android SDK
    uses: android-actions/setup-android@v3

  - name: Install Cordova Compiler CLI
    run: npm install -g cordova

  - name: Create Native App Shell
    run: |
      cordova create khokhabliss com.khokhabliss.tracker "Khokha Bliss"
      cd khokhabliss
      cordova platform add android
      
      # Clean original placeholder files and replace with your customized index.html
      rm -rf www/*
      cp ../index.html www/

  - name: Compile Unsigned Debug APK
    run: |
      cd khokhabliss
      # Building a debug APK is highly recommended for personal use
      # because it installs instantly on your phone without needing security certificates.
      cordova build android --debug

  - name: Export APK to Download Center
    uses: actions/upload-artifact@v4
    with:
      name: KhokhaBliss-Android-APK
      path: khokhabliss/platforms/android/app/build/outputs/apk/debug/app-debug.apk
