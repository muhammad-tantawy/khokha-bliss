name: Build Khokha Bliss APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Compile Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Android SDK Command Line Tools
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Native App Shell
        run: |
          cordova create khokhabliss com.khokhabliss.tracker "Khokha Bliss"
          cd khokhabliss
          cordova platform add android
          rm -rf www/*
          cp ../index.html www/

      - name: Build APK
        run: |
          cd khokhabliss
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KhokhaBliss-Android-APK
          path: khokhabliss/platforms/android/app/build/outputs/apk/debug/app-debug.apk
